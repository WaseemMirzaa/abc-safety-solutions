# Nginx for PM2 deployment (frontend dist + API on :3000)
# Install: sudo cp deploy/nginx-pm2.conf /etc/nginx/sites-available/abc-safety
#          sudo ln -sf /etc/nginx/sites-available/abc-safety /etc/nginx/sites-enabled/
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx
#
# Set in .env (project root):
#   PUBLIC_BASE_URL=http://2.24.110.154
#   FRONTEND_URL=http://2.24.110.154

server {
    listen 80;
    listen [::]:80;
    server_name 2.24.110.154;

    # Large uploads (.pptx decks) — 1 GB max request body
    client_max_body_size 1g;

    root /opt/abc-safety-solutions/frontend/dist;
    index index.html;

    location /api/ {
        client_max_body_size 1g;
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:3000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
